<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #18181b;
      color: #e4e4e7;
      padding: 14px;
    }
    .url-box {
      background: #27272a;
      border-radius: 6px;
      padding: 8px 10px;
      word-break: break-all;
      color: #a1a1aa;
      font-size: 12px;
      margin-bottom: 10px;
      min-height: 36px;
      line-height: 1.5;
    }
    button {
      width: 100%;
      padding: 9px;
      border: none;
      border-radius: 6px;
      background: #3b82f6;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #2563eb; }
    button:disabled { background: #52525b; cursor: default; }
    .status {
      margin-top: 8px;
      text-align: center;
      font-size: 12px;
      min-height: 18px;
      color: #a1a1aa;
    }
    .status.ok  { color: #34d399; }
    .status.err { color: #f87171; }
    .settings-link {
      margin-top: 10px;
      text-align: right;
    }
    .settings-link a {
      color: #52525b;
      font-size: 11px;
      text-decoration: none;
    }
    .settings-link a:hover { color: #a1a1aa; }
  </style>
</head>
<body>
  <div class="url-box" id="url">正在获取当前页面...</div>
  <button id="btn">发送下载</button>
  <div class="status" id="status"></div>
  <div class="settings-link"><a id="opt" href="#">⚙ 设置</a></div>
  <script src="popup.js"></script>
</body>
</html>
