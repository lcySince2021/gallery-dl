<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Gallery-DL 设置</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 400px;
      margin: 40px auto;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      color: #e4e4e7;
      background: #18181b;
      padding: 24px;
    }
    h2 { margin-bottom: 20px; font-size: 16px; }
    label { display: block; margin-bottom: 4px; color: #a1a1aa; font-size: 12px; }
    input {
      width: 100%;
      padding: 8px 10px;
      background: #27272a;
      border: 1px solid #3f3f46;
      border-radius: 6px;
      color: #e4e4e7;
      font-size: 13px;
      margin-bottom: 14px;
      outline: none;
    }
    input:focus { border-color: #3b82f6; }
    button {
      padding: 9px 20px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #2563eb; }
    .saved { margin-left: 10px; color: #34d399; font-size: 13px; }
    .hint { color: #52525b; font-size: 11px; margin-top: -10px; margin-bottom: 14px; }
  </style>
</head>
<body>
  <h2>Gallery-DL Bot 设置</h2>
  <label>服务器地址</label>
  <input type="text" id="serverUrl" placeholder="http://YOUR_SERVER_IP:8088">
  <p class="hint">NAS 的局域网 IP + 端口 8080</p>
  <label>Chat ID（你的 Telegram 用户 ID）</label>
  <input type="text" id="chatId" placeholder="123456789">
  <button id="save">保存</button>
  <span class="saved" id="saved"></span>
  <script src="options.js"></script>
</body>
</html>
